name: Docker Test Vectors

on:
  push:
    branches: [ main ]
  pull_request:
      branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'typeberry version: `next` (default), `<semver>-<sha>` (pre-release), or `<semver>` (release)'
        required: false
        default: 'next'
  repository_dispatch:
  schedule:
    # 8:00 AM Europe/Warsaw (6:00 UTC, using UTC+2 summer time)
    - cron: '0 6 * * *'
    # 12:00 PM Europe/Warsaw (10:00 UTC)
    - cron: '0 10 * * *'
    # 4:00 PM Europe/Warsaw (14:00 UTC)
    - cron: '0 14 * * *'
    # 8:00 PM Europe/Warsaw (18:00 UTC)
    - cron: '0 18 * * *'
    # Midnight Europe/Warsaw (22:00 UTC previous day)
    - cron: '0 22 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  init:
    name: Initializing environment
    runs-on: [self-hosted, non-perf]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Provision Typeberry image
        uses: ./.github/actions/provision-typeberry
        with:
          target: source
          version: ${{ github.event.inputs.version || 'next' }}

  docker-test-vectors:
    needs: init
    name: Docker Test Vectors Test
    runs-on: [self-hosted, non-perf]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Docker Test Vectors test
        env:
          # Consume the isolated source image (see provision-typeberry/provision.sh);
          # the shared `typeberry:test` tag is owned by the docker/npm workflows.
          TYPEBERRY_IMAGE: typeberry:source
        run: |
          npm exec tsx --test tests/docker-test-vectors.test.ts
