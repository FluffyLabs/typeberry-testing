name: Minifuzz Tests

on:
  push:
    branches: [ main ]
  pull_request:
      branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'typeberry version: `next` (default), `<semver>-<sha>` (pre-release), or `<semver>` (release)'
        required: false
        default: 'next'
  repository_dispatch:
  schedule:
    # 2x/day (reduced from 5x) — staggered overnight to relieve the single shared self-hosted runner.
    # 22:00 Europe/Warsaw = 20:00 UTC (UTC+2 summer)
    - cron: '0 20 * * *'
    # 06:00 Europe/Warsaw = 04:00 UTC (UTC+2 summer)
    - cron: '0 4 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  minifuzz:
    name: Minifuzz Tests
    runs-on: [self-hosted, non-perf]
    strategy:
      fail-fast: false
      matrix:
        test: [burn, forks, no_forks]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Provision Typeberry image
        uses: ./.github/actions/provision-typeberry
        with:
          target: docker
          version: ${{ github.event.inputs.version || 'next' }}

      - name: Build minifuzz
        run: npm run build -w minifuzz

      - name: Run Minifuzz ${{ matrix.test }} test
        run: |
          npm exec tsx --test tests/minifuzz/${{ matrix.test }}.test.ts

      - name: Reap test containers and volumes
        if: always()
        run: |
          docker ps -aq --filter "label=ci-run=${{ github.run_id }}" | xargs -r docker rm -f
          docker volume ls -q --filter "label=ci-run=${{ github.run_id }}" | xargs -r docker volume rm -f
