name: NPM Imports

on:
  push:
    branches: [ main ]
  pull_request:
      branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'typeberry version: `next` (default), `<semver>-<sha>` (pre-release), or `<semver>` (release)'
        required: false
        default: 'next'
  repository_dispatch:
  schedule:
    # 1x/day (reduced from 5x) — staggered overnight to relieve the single shared self-hosted runner.
    # 04:00 Europe/Warsaw = 02:00 UTC (UTC+2 summer)
    - cron: '0 2 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  npm-imports:
    name: NPM Imports Test
    runs-on: [self-hosted, non-perf]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          submodules: 'recursive'
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Provision Typeberry image
        uses: ./.github/actions/provision-typeberry
        with:
          target: npm
          version: ${{ github.event.inputs.version || 'next' }}
      - name: Run Imports test (npm image)
        run: |
          npm exec tsx --test tests/docker-imports.test.ts
