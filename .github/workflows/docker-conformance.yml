name: Docker Conformance

on:
  push:
    branches: [ main ]
  pull_request:
      branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'typeberry version: `next` (default), `<semver>-<sha>` (pre-release), or `<semver>` (release)'
        required: false
        default: 'next'
  repository_dispatch:
  schedule:
    # 1x/day (reduced from 5x) — staggered overnight to relieve the single shared self-hosted runner.
    # 00:00 Europe/Warsaw = 22:00 UTC (UTC+2 summer)
    - cron: '0 22 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  init:
    name: Initializing environment
    runs-on: [self-hosted, non-perf]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Provision Typeberry image
        uses: ./.github/actions/provision-typeberry
        with:
          target: source
          version: ${{ github.event.inputs.version || 'next' }}

  docker-conformance:
    needs: init
    name: Docker Conformance Test
    runs-on: [self-hosted, non-perf]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Docker Conformance test
        env:
          # Consume the isolated source image (see provision-typeberry/provision.sh);
          # the shared `typeberry:test` tag is owned by the docker/npm workflows.
          TYPEBERRY_IMAGE: typeberry:source
        run: |
          npm exec tsx --test tests/docker-conformance.test.ts

      - name: Reap test containers and volumes
        if: always()
        run: |
          docker ps -aq --filter "label=ci-run=${{ github.run_id }}" | xargs -r docker rm -f
          docker volume ls -q --filter "label=ci-run=${{ github.run_id }}" | xargs -r docker volume rm -f
